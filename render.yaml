services:
  - type: web
    name: finbot-guardrail-webhook
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 30
    envVars:
      - key: WEBHOOK_SECRET
        sync: false          # You set this manually in Render dashboard
      - key: TIMESTAMP_TOLERANCE
        value: "300"
      - key: RATE_LIMIT_MAX
        value: "60"
      - key: RATE_LIMIT_WINDOW
        value: "60"
